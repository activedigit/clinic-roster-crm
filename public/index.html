<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>מערכת ניהול משמרות</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🩺</text></svg>">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="container narrow" style="padding-top: 8vh">
    <div class="card state-box">
      <div class="emoji">🩺</div>
      <h2>מערכת לניהול משמרות רופאים ואחים/ות</h2>
      <p style="margin-top:10px">
        זהו דף המערכת. להתחברות השתמש בקישור האישי שלך:
      </p>
      <div style="text-align:start; margin-top:18px; display:grid; gap:14px">
        <div class="card" style="box-shadow:none; background:#f8fafc">
          <strong>👨‍⚕️ אם אתה רופא או אח/ות:</strong>
          <p style="color:var(--muted); margin-top:4px">פתח את הקישור האישי שקיבלת מההנהלה כדי לסמן את ימי המשמרת שלך.</p>
        </div>
        <div class="card" style="box-shadow:none; background:#f8fafc">
          <strong>🧑‍💼 אם אתה המנהל:</strong>
          <p style="color:var(--muted); margin-top:4px">השתמש בקישור הניהול הסודי (מופיע במסך ההפעלה / הטרמינל בעת הרצת התוכנה).</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
